{% extends "ad/base.html" %}
{% block content %}

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Donations</h3>
    <a href="#" class="btn btn-primary btn-sm">Add Donation</a>
  </div>

  <table class="table table-bordered table-striped">
    <thead>
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>PAN</th>
    <th>Amount</th>
    <th>Cause</th>
    <th>Action</th>
  </tr>
</thead>

    <tbody>
  {% for d in donations %}
  <tr>
    <td>{{ d.name }}</td>
    <td>{{ d.email }}</td>
    <td>{{ d.phone }}</td>
    <td>{{ d.pan }}</td>
    <td>₹{{ d.amount }}</td>
    <td>{{ d.cause }}</td>
    <td>
      <a href="{% url 'donation_edit' d.id %}" class="btn btn-sm btn-warning">Edit</a>
      <a href="{% url 'donation_delete' d.id %}" class="btn btn-sm btn-danger"
         onclick="return confirm('Delete this donation?')">Delete</a>
    </td>
  </tr>
  {% empty %}
  <tr>
    <td colspan="7" class="text-center">No donations found</td>
  </tr>
  {% endfor %}
</tbody>
  </table>
</div>

{% endblock %}
