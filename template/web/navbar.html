{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

<!-- Bootstrap 5.3 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<!-- Your CSS -->
<link rel="stylesheet" href="{% static 'web/css/navbar.css' %}">

<header class="sticky-top">
  <nav class="navbar navbar-expand-lg ngo-navbar">
    <div class="container">

      <!-- Brand -->
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <img src="{% static 'web/css/ngo_logo.jpeg' %}" class="ngo-logo" alt="NGO Logo">
        <div class="d-none d-sm-block">
          <div class="ngo-title">NGO MANAGEMENT</div>
          <div class="ngo-subtitle">Together we can help</div>
        </div>
      </a>

      <!-- CSS Toggler (NO JS) -->
      <input type="checkbox" id="ngoNavToggle" class="ngo-toggle" />
      <label for="ngoNavToggle" class="ngo-burger" aria-label="Toggle Menu">
        <span></span><span></span><span></span>
      </label>

      <!-- Menu -->
      <div class="ngo-menu">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">

          <li class="nav-item">
            <a class="nav-link active" href="/"><i class="fa-solid fa-house me-1"></i>Home</a>

          <li class="nav-item">
            <a class="nav-link" href="/about"><i class="fa-solid fa-circle-info me-1"></i>About</a>

          <li class="nav-item">
            <a class="nav-link" href="/events"><i class="fa-solid fa-calendar-days me-1"></i>Events</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/volunteers"><i class="fa-solid fa-people-group me-1"></i>Volunteers</a>

          <li class="nav-item">
            <a class="nav-link" href="/gallery"><i class="fa-solid fa-images me-1"></i>Gallery</a>
          </li>

          <li class="nav-item ngo-dd">
            <a class="nav-link dd-btn" href="#">
              <i class="fa-solid fa-grid-2 me-1"></i>More
              <i class="fa-solid fa-chevron-down ms-1 dd-ic"></i>
            </a>

            <ul class="ngo-dropdown">
              <li><a class="dropdown-item" href="/causes_programs"><i class="fa-solid fa-hand-holding-heart me-2"></i>Causes / Programs</a></li>

              <li><hr class="ngo-divider"></li>

              <li><a class="dropdown-item" href="/terms"><i class="fa-solid fa-file-contract me-2"></i>Terms</a></li>
              <li><a class="dropdown-item" href="/privacy"><i class="fa-solid fa-shield-halved me-2"></i>Privacy</a></li>
              <li><a class="dropdown-item" href="/faq"><i class="fa-solid fa-circle-question me-2"></i>FAQ</a></li>
              <li><a class="dropdown-item" href="/contact"><i class="fa-solid fa-phone me-2"></i>Contact</a></li>
            </ul>
          </li>

          <li class="nav-item ms-lg-2">
            <a class="btn ngo-donate" href="/donate">
              <i class="fa-solid fa-heart me-1"></i>Donate
            </a>
          </li>

        </ul>
