<!-- AOS JS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
  AOS.init({
    once: true,
    duration: 800,
    easing: "ease-in-out",
    offset: 80
  });

  /* ✅ AUTO ACTIVE CURRENT PAGE */
  (function () {
    // current filename (index.html, event_deepsik.html...)
    const current = (location.pathname.split("/").pop() || "index.html").toLowerCase();

    // remove old actives
    document.querySelectorAll(".ngo-navbar .active").forEach(el => el.classList.remove("active"));

    // top links
    document.querySelectorAll(".ngo-navbar .nav-link[href]").forEach(a => {
      const href = (a.getAttribute("href") || "").toLowerCase();
      if (href && href === current) a.classList.add("active");
    });

    // dropdown links + make "More" active too
    let matchedDropdown = false;
    document.querySelectorAll(".ngo-navbar .ngo-dropdown .dropdown-item[href]").forEach(a => {
      const href = (a.getAttribute("href") || "").toLowerCase();
      if (href && href === current) {
        a.classList.add("active");
        matchedDropdown = true;
      }
    });

    if (matchedDropdown) {
      document.querySelector(".ngo-navbar .dd-btn")?.classList.add("active");
    }
  })();
</script>
